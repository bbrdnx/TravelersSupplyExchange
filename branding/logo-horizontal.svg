<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 240" fill="none" role="img" aria-label="Traveler Supply Exchange" data-tse-logo-version="2" data-tse-logo-layout="horizontal" data-tse-logo-status="latest">
  <!-- TSE logo v2 (latest) | horizontal lockup | 2026-06-24 -->
  <defs>
    <clipPath id="h-clip-top">
      <rect x="315" y="67" width="190" height="190" rx="26" transform="rotate(45 410 162)"/>
    </clipPath>
    <clipPath id="h-clip-left">
      <rect x="155" y="227" width="190" height="190" rx="26" transform="rotate(45 250 322)"/>
    </clipPath>
    <clipPath id="h-clip-right">
      <rect x="475" y="227" width="190" height="190" rx="26" transform="rotate(45 570 322)"/>
    </clipPath>
    <clipPath id="h-clip-bottom">
      <rect x="315" y="387" width="190" height="190" rx="26" transform="rotate(45 410 482)"/>
    </clipPath>
    <clipPath id="h-clip-globe">
      <circle cx="410" cy="482" r="40"/>
    </clipPath>
    <style>
      .wordmark {
        font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: hanging;
      }
      .traveler, .exchange { fill: #012F61; }
      .supply { fill: #317E4A; }
    </style>
  </defs>

  <!-- Icon cluster: even 160px offset on all four axes. Bounds ~115.65,27.65 to 704.35,616.35 -->
  <g transform="translate(24 32) scale(0.295593) translate(-115.65 -27.65)">
    <rect x="315" y="67" width="190" height="190" rx="26" transform="rotate(45 410 162)" fill="#398CD8"/>
    <rect x="155" y="227" width="190" height="190" rx="26" transform="rotate(45 250 322)" fill="#012F61"/>
    <rect x="475" y="227" width="190" height="190" rx="26" transform="rotate(45 570 322)" fill="#012F61"/>
    <rect x="315" y="387" width="190" height="190" rx="26" transform="rotate(45 410 482)" fill="#317E4A"/>

    <g clip-path="url(#h-clip-top)">
      <g transform="translate(410 162)">
        <path fill="#FFFFFF" d="M-28 6 L-14 6 L-14 -18 Q-14 -26 0 -26 Q14 -26 14 -18 L14 6 L28 6 Q32 6 32 10 L32 42 Q32 46 28 46 L-28 46 Q-32 46 -32 42 L-32 10 Q-32 6 -28 6 Z"/>
        <rect x="-9" y="-22" width="18" height="11" rx="4" fill="#398CD8"/>
        <rect x="-20" y="12" width="8" height="28" rx="4" fill="#398CD8"/>
        <rect x="-4" y="12" width="8" height="28" rx="4" fill="#398CD8"/>
        <rect x="12" y="12" width="8" height="28" rx="4" fill="#398CD8"/>
        <rect x="-30" y="38" width="12" height="8" rx="4" fill="#FFFFFF"/>
        <rect x="18" y="38" width="12" height="8" rx="4" fill="#FFFFFF"/>
      </g>
    </g>

    <g clip-path="url(#h-clip-left)">
      <path fill="#FFFFFF" transform="translate(250 322)" d="M-58 0 L-40 -16 L-40 -7 L40 -7 L40 -16 L58 0 L40 16 L40 7 L-40 7 L-40 16 Z"/>
    </g>

    <g clip-path="url(#h-clip-right)">
      <g transform="translate(570 322)">
        <path d="M-12 -36 C-12 -48 12 -48 12 -36" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none"/>
        <path d="M-34 2 C-34 -14 -18 -20 0 -20 C18 -20 34 -14 34 2 V16 H-34 Z" fill="#FFFFFF"/>
        <rect x="-7" y="6" width="14" height="11" rx="2.5" fill="#FFFFFF"/>
        <rect x="-26" y="18" width="52" height="30" rx="8" fill="none" stroke="#FFFFFF" stroke-width="6"/>
      </g>
    </g>

    <g clip-path="url(#h-clip-bottom)">
      <g clip-path="url(#h-clip-globe)">
        <circle cx="410" cy="482" r="40" stroke="#FFFFFF" stroke-width="5" fill="none"/>
        <ellipse cx="410" cy="482" rx="16" ry="40" stroke="#FFFFFF" stroke-width="4" fill="none"/>
        <ellipse cx="410" cy="482" rx="40" ry="16" stroke="#FFFFFF" stroke-width="4" fill="none"/>
        <line x1="410" y1="442" x2="410" y2="522" stroke="#FFFFFF" stroke-width="4"/>
        <line x1="370" y1="482" x2="450" y2="482" stroke="#FFFFFF" stroke-width="4"/>
      </g>
    </g>
  </g>

  <!-- Wordmark: centered on shared axis. TRAVELER stretched to EXCHANGE width via letter-spacing only. -->
  <g id="wordmark">
    <text class="wordmark traveler" x="375" y="32" font-size="52" letter-spacing="3.8" textLength="355.02" lengthAdjust="spacing">TRAVELER</text>
    <text class="wordmark supply" x="375" y="100" font-size="38" letter-spacing="2.6">&#8212; SUPPLY &#8212;</text>
    <text class="wordmark exchange" x="375" y="154" font-size="52" letter-spacing="3.8">EXCHANGE</text>
  </g>
</svg>
